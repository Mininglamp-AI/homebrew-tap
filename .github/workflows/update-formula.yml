name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update formula
        run: |
          FORMULA="${{ github.event.client_payload.formula }}"
          VERSION="${{ github.event.client_payload.version }}"
          URL="${{ github.event.client_payload.url }}"
          SHA256="${{ github.event.client_payload.sha256 }}"

          FILE="Formula/${FORMULA}.rb"
          if [ ! -f "$FILE" ]; then
            echo "Formula $FILE not found, copying from source"
            exit 1
          fi

          # Update version, url, sha256 in the formula
          sed -i "s|url \".*\"|url \"${URL}\"|" "$FILE"
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" "$FILE"
          sed -i "s|version \".*\"|version \"${VERSION}\"|" "$FILE"

          cat "$FILE"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/
          git commit -m "Update ${{ github.event.client_payload.formula }} to ${{ github.event.client_payload.version }}"
          git push
